name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Publish
        run: dotnet publish DietTracker.Browser/DietTracker.Browser.csproj -c Release -o publish-output

      - name: Fix base path for GitHub Pages
        run: |
          sed -i 's|<base href="/" />|<base href="/DietTracker/" />|' publish-output/wwwroot/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish-output/wwwroot

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4